name: fspez
description: A mobile Reddit client that supports multiple accounts without the paid Reddit API.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ^3.22.0

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  collection: ^1.18.0
  universal_html: ^2.3.0
  video_player: ^2.11.1
  video_player_win: ^3.2.2
  visibility_detector: ^0.4.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
