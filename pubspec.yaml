name: fspez
description: A mobile Reddit client that supports multiple accounts without the paid Reddit API.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ^3.22.0

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.0
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0

  equatable: ^2.1.0
  collection: ^1.18.0
  universal_html: ^2.3.0
  video_player: ^2.11.1
  video_player_win: ^3.2.2
  file_picker: ^11.0.2
  visibility_detector: ^0.4.0
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.2.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  mocktail: ^1.0.0

dependency_overrides:
  flutter_inappwebview_windows:
    path: third_party/flutter_inappwebview_windows

flutter:
  uses-material-design: true
  assets:
    - assets/
